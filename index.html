<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MedMap Premium</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #f2f4f7;
  display: flex;
  justify-content: center;
}

.app {
  width: 380px;
  background: white;
  min-height: 100vh;
}

header {
  background: linear-gradient(135deg,#e63946,#ff6b6b);
  color: white;
  padding: 18px;
  font-size: 20px;
  font-weight: bold;
}

.container { padding: 15px; }

.conditions {
  display: flex;
  gap: 10px;
  margin-top: -20px;
}

.card-option {
  flex: 1;
  background: white;
  padding: 10px;
  border-radius: 12px;
  text-align: center;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  cursor: pointer;
  transition: 0.2s;
}

.card-option:hover { transform: scale(1.05); }

.active { background:#e63946; color:white; }

.card {
  background: white;
  border-radius: 16px;
  padding: 15px;
  margin-top: 15px;
  box-shadow: 0 6px 15px rgba(0,0,0,0.08);
}

.bar { height: 8px; background:#ddd; border-radius:5px; margin:5px 0; }
.fill { height:100%; border-radius:5px; }
.low { background:#2a9d8f; width:30%; }
.medium { background:#f4a261; width:60%; }
.high { background:#e63946; width:90%; }

.tag {
  background:#eee;
  padding:4px 8px;
  border-radius:8px;
  font-size:12px;
  margin-right:5px;
}

.actions { display:flex; gap:10px; margin-top:10px; }
.btn {
  flex:1;
  padding:10px;
  border:none;
  border-radius:10px;
  color:white;
}
.call { background:#2a9d8f; }
.map { background:#457b9d; }

.recommended { color:#e63946; font-weight:bold; }
.reason { font-size:12px; color:gray; }

.sos {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#e63946;
  color:white;
  padding:15px;
  border-radius:50%;
  border:none;
}

.emergency {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:red;
  color:white;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  animation: blink 1s infinite;
}

@keyframes blink {
  0%{opacity:1;} 50%{opacity:0.7;} 100%{opacity:1;}
}

.mapScreen {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:white;
  display:none;
  text-align:center;
}

.loading {
  text-align:center;
  padding:20px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="app">

<header>🚑 MedMap</header>

<div class="container">

  <div class="conditions">
    <div class="card-option" onclick="selectCondition(this,'heart')">❤️ Heart</div>
    <div class="card-option" onclick="selectCondition(this,'accident')">🚑 Accident</div>
    <div class="card-option" onclick="selectCondition(this,'child')">👶 Child</div>
  </div>

  <div id="loading" class="loading"></div>
  <div id="list"></div>

</div>

</div>

<button class="sos" onclick="sos()">🚨</button>

<div class="emergency" id="emergency">
  <h1>🚨 EMERGENCY MODE</h1>
  <p>Calling nearest hospital...</p>
  <button onclick="closeEmergency()">Close</button>
</div>

<div class="mapScreen" id="mapScreen">
  <h2>🗺️ Route to Hospital</h2>
  <p>ETA: 6 mins</p>
  <p>Distance: 2.1 km</p>
  <button onclick="closeMap()">Back</button>
</div>

<script>
const hospitals=[
 {name:"CityCare",dist:2.1,crowd:"low",specialist:["cardio","trauma"]},
 {name:"LifeLine",dist:3.5,crowd:"high",specialist:["cardio","pediatric"]},
 {name:"Green Valley",dist:1.2,crowd:"medium",specialist:["pediatric"]}
];

let condition="";

function selectCondition(el,c){
  document.querySelectorAll(".card-option").forEach(e=>e.classList.remove("active"));
  el.classList.add("active");

  condition=c;

  document.getElementById("list").innerHTML="";
  document.getElementById("loading").innerHTML="🧠 Analyzing best hospitals...";

  setTimeout(render,1000);
}

function match(h){
  if(condition==="heart") return h.specialist.includes("cardio");
  if(condition==="accident") return h.specialist.includes("trauma");
  if(condition==="child") return h.specialist.includes("pediatric");
  return true;
}

function recommend(list){
  if(list.length===0) return null;

  return list.sort((a,b)=>{
    let scoreA=a.dist;
    let scoreB=b.dist;

    if(condition==="heart"){
      if(a.specialist.includes("cardio")) scoreA-=2;
      if(b.specialist.includes("cardio")) scoreB-=2;
    }

    if(condition==="child"){
      if(a.specialist.includes("pediatric")) scoreA-=2;
      if(b.specialist.includes("pediatric")) scoreB-=2;
    }

    if(condition==="accident"){
      if(a.specialist.includes("trauma")) scoreA-=2;
      if(b.specialist.includes("trauma")) scoreB-=2;
    }

    if(a.crowd==="low") scoreA-=1;
    if(b.crowd==="low") scoreB-=1;

    return scoreA-scoreB;
  })[0];
}

function render(){
  let list=document.getElementById("list");
  let load=document.getElementById("loading");
  load.innerHTML="";

  let filtered=hospitals.filter(match);

  if(filtered.length===0){
    list.innerHTML="<p>No hospitals found</p>";
    return;
  }

  let best=recommend(filtered);

  filtered.forEach(h=>{
    let rec = h===best?`
      <div class="recommended">⭐ AI Recommended</div>
      <div class="reason">
        ${condition ? `Best for ${condition}` : "Best for general use"}
      </div>`:"";

    list.innerHTML+=`
    <div class="card">
      ${rec}
      <h3>${h.name}</h3>
      <p>${h.dist} km</p>

      <div>Crowd</div>
      <div class="bar"><div class="fill ${h.crowd}"></div></div>

      <p>👨‍⚕️ ${h.specialist.join(", ")}</p>

      <div class="actions">
        <button class="btn call">Call</button>
        <button class="btn map" onclick="openMap()">Directions</button>
      </div>
    </div>`;
  });
}

function sos(){ document.getElementById("emergency").style.display="flex"; }
function closeEmergency(){ document.getElementById("emergency").style.display="none"; }

function openMap(){ document.getElementById("mapScreen").style.display="block"; }
function closeMap(){ document.getElementById("mapScreen").style.display="none"; }

/* 🔥 IMPORTANT: show hospitals by default */
render();
</script>

</body>
</html>
